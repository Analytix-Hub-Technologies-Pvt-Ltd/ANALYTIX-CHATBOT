# GitHub Actions CI/CD Workflow for AnalytixHub Chatbot Azure Deployment
name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout codebase
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Setup Node.js Environment
      - name: Set up Node.js v20
        uses: actions/setup-node@v4
        with:
          node-level: '20'
          cache: 'npm'

      # 3. Install Dependencies
      - name: Install Production Dependencies
        run: |
          npm ci --only=production

      # 4. Deploy directly to Azure App Service
      - name: Run Azure WebApp Deploy
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'analytixhub-bot' # <--- Change this to your exact Azure Web App name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
